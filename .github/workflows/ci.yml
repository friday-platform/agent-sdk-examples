name: ci

# Lint runs on every commit pushed to any branch, and on pull requests.
on:
  push:
  pull_request:

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      # ruff is pinned via uv.lock and bumped by Dependabot, not hardcoded here.
      - name: Lint
        run: uv run --locked ruff check --output-format=github .

      - name: Format check
        run: uv run --locked ruff format --check .
